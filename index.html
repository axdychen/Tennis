<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TennisEdge</title>
//api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
:root{--bg:#141312;--sur:#1c1b19;--sur2:#252422;--bor:#393836;--txt:#e0deda;--mut:#8a8985;--fnt:#56544f;--pri:#4f98a3;--ok:#6daa45;--okb:#253320;--er:#d163a7;--erb:#3a2334;--wa:#e08040;--wab:#3a2718;--go:#e8af34;--gob:#302b18;--rad:0.75rem}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Satoshi',Inter,sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;font-size:14px}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit}
table{border-collapse:collapse;width:100%}
a{color:inherit;text-decoration:none}
.topbar{position:sticky;top:0;z-index:100;background:var(--sur);border-bottom:1px solid var(--bor);padding:12px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:16px;font-weight:700;letter-spacing:-.02em}
.logo span{color:var(--pri)}
.nav-tabs{display:flex;gap:4px;padding:16px 24px 0;border-bottom:1px solid var(--bor);background:var(--sur);overflow-x:auto}
.tab-btn{padding:8px 16px;border-radius:6px 6px 0 0;font-size:14px;font-weight:500;color:var(--mut);border:1px solid transparent;border-bottom:none;position:relative;bottom:-1px;background:transparent;white-space:nowrap;transition:all 180ms}
.tab-btn:hover{color:var(--txt);background:var(--sur2)}
.tab-btn.active{color:var(--txt);background:var(--bg);border-color:var(--bor);border-bottom-color:var(--bg);font-weight:600}
.tab-panel{display:none;padding:24px}
.tab-panel.active{display:block}
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);padding:16px}
.stat-label{font-size:11px;color:var(--mut);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.stat-value{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.green{color:var(--ok)}.gold{color:var(--go)}.red{color:var(--er)}
.section-title{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--pri);display:inline-block}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid var(--bor);background:var(--sur);color:var(--mut);transition:all 180ms}
.filter-btn:hover{border-color:var(--pri);color:var(--pri)}
.filter-btn.active{background:var(--pri);border-color:var(--pri);color:#fff}
.matches-grid{display:flex;flex-direction:column;gap:16px}
.match-card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);overflow:hidden}
.match-meta{display:flex;align-items:center;gap:8px;padding:8px 20px;background:var(--sur2);border-bottom:1px solid var(--bor);font-size:11px;color:var(--mut)}
.tag{padding:2px 8px;border-radius:20px;border:1px solid var(--bor);background:var(--sur2)}
.surface-clay{background:#3d2010;color:#e08040}
.surface-hard{background:#102040;color:#4f98a3}
.surface-grass{background:#0f2d10;color:#6daa45}
.match-header{display:grid;grid-template-columns:1fr auto 1fr auto;align-items:center;gap:16px;padding:16px 20px;cursor:pointer}
.player-name{font-size:15px;font-weight:700}
.player-rank{font-size:11px;color:var(--mut)}
.player-form{display:flex;gap:3px;margin-top:4px}
.match-player.right{text-align:right}
.match-player.right .player-form{justify-content:flex-end}
.form-dot{width:10px;height:10px;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:800}
.form-dot.W{background:var(--okb);color:var(--ok)}
.form-dot.L{background:var(--erb);color:var(--er)}
.match-vs{display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--fnt)}
.match-actions{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
.conf-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700}
.conf-high{background:var(--okb);color:var(--ok)}
.conf-medium{background:var(--gob);color:var(--go)}
.conf-lean{background:#213538;color:var(--pri)}
.sharp-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;border:1px solid var(--bor);background:var(--sur2)}
.expand-btn{width:28px;height:28px;border-radius:6px;background:var(--sur2);border:1px solid var(--bor);display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:13px;transition:transform 180ms}
.expand-btn.open{transform:rotate(180deg)}
.match-body{display:none;border-top:1px solid var(--bor);padding:20px;background:#201f1d;grid-template-columns:1fr 1fr 1fr;gap:20px}
.match-body.open{display:grid}
.info-block-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);padding-bottom:8px;border-bottom:1px solid var(--bor);margin-bottom:12px}
.info-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:11px}
.info-key{color:var(--mut)}
.info-val{font-weight:600;font-variant-numeric:tabular-nums}
.pick-box{background:#213538;border:1px solid var(--bor);border-radius:var(--rad);padding:12px 16px;margin-top:8px}
.pick-label{font-size:11px;font-weight:700;color:var(--pri);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.pick-text{font-size:11px;color:var(--txt);line-height:1.5}
.injury-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.injury-active{background:var(--erb);color:var(--er)}
.injury-none{background:var(--okb);color:var(--ok)}
.injury-minor{background:var(--wab);color:var(--wa)}
.money-bar{height:6px;border-radius:20px;background:var(--sur2);overflow:hidden;margin-top:4px}
.money-bar-fill{height:100%;border-radius:20px;transition:width 1s ease}
.bar-t{background:var(--pri)}.bar-h{background:var(--go)}
.log-btn{width:100%;padding:8px;border-radius:6px;background:var(--pri);color:#fff;font-size:11px;font-weight:700;cursor:pointer;border:none;margin-top:12px}
.tracker-form{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);padding:24px;margin-bottom:24px}
.form-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:12px;align-items:end}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:11px;font-weight:600;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
.form-input,.form-select{padding:8px 12px;border-radius:6px;border:1px solid var(--bor);background:var(--sur2);color:var(--txt);font-size:14px;font-family:inherit;outline:none}
.form-input:focus,.form-select:focus{border-color:var(--pri)}
.btn-add{padding:8px 20px;border-radius:6px;background:var(--pri);color:#fff;font-size:14px;font-weight:600;white-space:nowrap;border:none;cursor:pointer}
.tbl-wrap{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);overflow:hidden;margin-bottom:24px}
.tbl th{text-align:left;padding:8px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);background:var(--sur2);border-bottom:1px solid var(--bor)}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--bor);font-size:12px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--sur2)}
.result-btn{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--bor);background:var(--sur2);color:var(--mut);transition:all 180ms;margin-right:4px}
.result-btn.win{background:var(--okb);color:var(--ok);border-color:var(--ok)}
.result-btn.loss{background:var(--erb);color:var(--er);border-color:var(--er)}
.empty{text-align:center;padding:60px 32px;color:var(--mut)}
.empty h3{color:var(--txt);margin-bottom:8px}
.summary-bar{position:sticky;bottom:0;z-index:50;background:var(--sur);border-top:1px solid var(--bor);padding:12px 24px;display:flex;align-items:center;gap:24px;overflow-x:auto}
.summary-item{display:flex;flex-direction:column;white-space:nowrap}
.summary-label{font-size:11px;color:var(--mut);font-weight:500}
.summary-val{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
.sdiv{width:1px;height:32px;background:var(--bor);flex-shrink:0}
.wl-section{background:var(--sur);border:1px solid var(--bor);border-radius:var(--rad);padding:20px;margin-bottom:24px}
.wl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-top:12px}
.wl-card{background:var(--sur2);border:1px solid var(--bor);border-radius:var(--rad);padding:14px;text-align:center}
.wl-val{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;margin-bottom:2px}
.wl-lbl{font-size:11px;color:var(--mut);font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.bet-row-logged{background:var(--okb)!important}
.bet-row-loss{background:var(--erb)!important}
.streak-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.streak-w{background:var(--okb);color:var(--ok)}
.streak-l{background:var(--erb);color:var(--er)}
@media(max-width:768px){.match-body.open{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr 1fr}.match-header{grid-template-columns:1fr auto 1fr}.match-actions{display:none}.wl-grid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
